<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendataan Ikan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #videoElement {
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fas fa-fish mr-2"></i> Data Ikan</h1>
        <div class="w-8"></div> 
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- Area Kamera -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
            <div class="relative w-full h-72 bg-gray-900 flex items-center justify-center">
                <video id="videoElement" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline></video>
                <img id="photoPreview" class="absolute inset-0 w-full h-full object-cover hidden z-10" alt="Preview">
                
                <button id="btnRetake" class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full hidden z-20 shadow-lg hover:bg-red-600">
                    <i class="fas fa-times"></i>
                </button>
                
                <div id="cameraStatus" class="text-white text-sm absolute z-0">Membuka kamera...</div>
            </div>
            
            <div class="p-4 flex justify-center bg-gray-50">
                <button id="btnCapture" class="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:bg-blue-700 active:scale-95 transition-transform border-4 border-blue-200">
                    <i class="fas fa-camera text-2xl"></i>
                </button>
            </div>
        </div>

        <!-- Form Data -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 space-y-4">
            
            <!-- Tipe Peserta -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Tipe Peserta</label>
                <div class="flex gap-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="tipePeserta" value="TEAM" class="w-4 h-4 text-blue-600" checked>
                        <span class="text-sm text-gray-700 font-medium">TEAM</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="tipePeserta" value="PERSEORANGAN" class="w-4 h-4 text-blue-600">
                        <span class="text-sm text-gray-700 font-medium">PERSEORANGAN</span>
                    </label>
                </div>
            </div>

            <!-- Nama Peserta (Dinamis) -->
            <div id="containerNama">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Peserta</label>
                <!-- Dropdown Team -->
                <div id="divTeam" class="relative">
                    <select id="namaTeam" class="w-full p-3 border border-gray-300 rounded-lg appearance-none bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="" disabled selected>Pilih Team...</option>
                        <option value="DYNAMITE">DYNAMITE</option>
                        <option value="TANGSLOW">TANGSLOW</option>
                        <option value="SCORPION">SCORPION</option>
                        <option value="PATRIOT">PATRIOT</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <!-- Input Manual Perseorangan -->
                <input type="text" id="namaManual" placeholder="Ketik nama peserta..." class="hidden w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <hr class="border-gray-100">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori Ikan</label>
                <div class="relative">
                    <select id="kategori" class="w-full p-3 border border-gray-300 rounded-lg appearance-none bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="" disabled selected>Pilih Kategori...</option>
                        <option value="CENCU">CENCU</option>
                        <option value="CHINGWA">CHINGWA</option>
                        <option value="GOLDENBASE">GOLDENBASE</option>
                        <option value="FREEMARKING">FREEMARKING</option>
                        <option value="KLASIK">KLASIK</option>
                        <option value="JUMBO">JUMBO</option>
                        <option value="BONSAI">BONSAI</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <div id="kelasContainer">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kelas</label>
                <div class="relative">
                    <select id="kelas" class="w-full p-3 border border-gray-300 rounded-lg appearance-none bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="" disabled selected>Pilih Kelas...</option>
                        <option value="A">Kelas A</option>
                        <option value="B">Kelas B</option>
                        <option value="C">Kelas C</option>
                        <option value="D">Kelas D</option>
                        <option value="E">Kelas E</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <div id="messageBox" class="hidden p-3 rounded-lg text-sm font-medium text-center"></div>

            <button id="btnSubmit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-blue-700 transition flex justify-center items-center">
                <span>Simpan Data</span>
                <i id="loadingSpinner" class="fas fa-circle-notch fa-spin ml-2 hidden"></i>
            </button>
        </div>

        <canvas id="canvasElement" class="hidden"></canvas>
    </main>

    <script>
        // URL Google Apps Script yang sudah dikunci
        const FIXED_GAS_URL = "https://script.google.com/macros/s/AKfycbzUp_5yKrKDN2OLyiOlXLAPxBEMT9ABGQjNSEdcP8iBfb87uJJL0ktEiSJwbtHxdFw/exec";

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const photoPreview = document.getElementById('photoPreview');
        const btnCapture = document.getElementById('btnCapture');
        const btnRetake = document.getElementById('btnRetake');
        const btnSubmit = document.getElementById('btnSubmit');
        const cameraStatus = document.getElementById('cameraStatus');
        const messageBox = document.getElementById('messageBox');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        const kategoriSelect = document.getElementById('kategori');
        const kelasSelect = document.getElementById('kelas');
        const kelasContainer = document.getElementById('kelasContainer');

        const radioTipe = document.getElementsByName('tipePeserta');
        const divTeam = document.getElementById('divTeam');
        const namaTeam = document.getElementById('namaTeam');
        const namaManual = document.getElementById('namaManual');

        let currentStream = null;
        let capturedImageData = null;

        // Logika Toggle Team vs Perseorangan
        radioTipe.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'TEAM') {
                    divTeam.classList.remove('hidden');
                    namaManual.classList.add('hidden');
                } else {
                    divTeam.classList.add('hidden');
                    namaManual.classList.remove('hidden');
                }
            });
        });

        // Logika Sembunyikan Kelas untuk JUMBO dan BONSAI
        kategoriSelect.addEventListener('change', () => {
            const val = kategoriSelect.value;
            if (val === "JUMBO" || val === "BONSAI") {
                kelasContainer.classList.add('hidden');
                kelasSelect.value = "-"; 
            } else {
                kelasContainer.classList.remove('hidden');
                if (kelasSelect.value === "-") kelasSelect.value = ""; 
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            startCamera();
        });

        async function startCamera() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: "environment" } },
                        audio: false
                    });
                    video.srcObject = currentStream;
                    cameraStatus.style.display = 'none';
                } catch (err) {
                    try {
                        currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                        video.srcObject = currentStream;
                        cameraStatus.style.display = 'none';
                    } catch (fallbackErr) {
                        cameraStatus.textContent = "Gagal mengakses kamera.";
                    }
                }
            }
        }

        btnCapture.addEventListener('click', () => {
            if (!currentStream) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedImageData = canvas.toDataURL('image/jpeg', 0.7);
            photoPreview.src = capturedImageData;
            photoPreview.classList.remove('hidden');
            btnRetake.classList.remove('hidden');
            btnCapture.disabled = true;
            btnCapture.classList.add('opacity-50');
        });

        btnRetake.addEventListener('click', () => {
            capturedImageData = null;
            photoPreview.classList.add('hidden');
            btnRetake.classList.add('hidden');
            btnCapture.disabled = false;
            btnCapture.classList.remove('opacity-50');
            photoPreview.src = "";
        });

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
            if (type === 'error') messageBox.classList.add('bg-red-100', 'text-red-700');
            else messageBox.classList.add('bg-green-100', 'text-green-700');
            setTimeout(() => { messageBox.classList.add('hidden'); }, 5000);
        }

        btnSubmit.addEventListener('click', async () => {
            const kategori = kategoriSelect.value;
            const kelas = kelasSelect.value;
            
            const tipeTerpilih = document.querySelector('input[name="tipePeserta"]:checked').value;
            const namaFinal = (tipeTerpilih === 'TEAM') ? namaTeam.value : namaManual.value;

            if (!capturedImageData) {
                showMessage("Ambil foto terlebih dahulu!", "error");
                return;
            }
            if (!namaFinal) {
                showMessage("Lengkapi Nama Peserta!", "error");
                return;
            }
            if (!kategori || (!kelas && !kelasContainer.classList.contains('hidden'))) {
                showMessage("Lengkapi Kategori dan Kelas!", "error");
                return;
            }

            btnSubmit.disabled = true;
            loadingSpinner.classList.remove('hidden');
            
            const base64Data = capturedImageData.split(',')[1];
            const finalKelas = (kategori === "JUMBO" || kategori === "BONSAI") ? "-" : kelas;

            const payload = {
                image: base64Data,
                filename: `FISH_${kategori}_${new Date().getTime()}.jpg`,
                kategori: kategori,
                kelas: finalKelas,
                nama: namaFinal,
                tipe: tipeTerpilih
            };

            try {
                const response = await fetch(FIXED_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    showMessage("Data berhasil disimpan ke Spreadsheet!", "success");
                    // Reset Form
                    kategoriSelect.value = "";
                    kelasSelect.value = "";
                    namaManual.value = "";
                    namaTeam.value = "";
                    kelasContainer.classList.remove('hidden');
                    btnRetake.click();
                } else {
                    showMessage("Gagal: " + result.message, "error");
                }
            } catch (error) {
                showMessage("Gagal menghubungi server. Periksa koneksi atau URL Script.", "error");
            } finally {
                btnSubmit.disabled = false;
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
